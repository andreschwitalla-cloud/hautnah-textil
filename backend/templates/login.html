<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Hautnah Textil</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .logo{font-size:22px;font-weight:900;margin-bottom:28px}
    .logo span{color:#00C2C7}
    h2{font-size:18px;margin-bottom:20px;color:#2B2D2F}
    input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
    input:focus{border-color:#00C2C7}
    button{width:100%;padding:13px;background:#00C2C7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
    button:hover{background:#009fa4}
    .fehler{color:#dc2626;font-size:13px;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">HAUT<span>NAH</span> <small style="font-size:10px;font-weight:500;color:#6b7280;letter-spacing:2px">ADMIN</small></div>
    <h2>Anmelden</h2>
    {% if fehler %}<p class="fehler">{{ fehler }}</p>{% endif %}
    <form method="post">
      <input type="password" name="passwort" placeholder="Passwort" required autofocus>
      <button type="submit">Einloggen</button>
    </form>
  </div>
</body>
</html>
